<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Node Nods AR</title>
<script src="https://unpkg.com/three@0.136.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#000;font-family:'Noto Sans KR',sans-serif}
#container{width:100vw;height:100vh;position:relative}
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#fff;font-size:14px;gap:12px;transition:opacity 0.5s}
#loading.hide{opacity:0;pointer-events:none}
.loader{width:40px;height:40px;border:2px solid rgba(255,255,255,0.1);border-top:2px solid #4A7AFF;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.5);font-size:11px;z-index:10;pointer-events:none}
</style>
</head>
<body>
<div id="container"></div>
<div id="loading">
  <div class="loader"></div>
  <div>카메라를 마커 이미지에 비춰주세요</div>
  <div style="font-size:11px;color:rgba(255,255,255,0.4)">Node Nods 경험노드 AR</div>
</div>
<div id="hint">마커 카드를 비추면 경험노드 세계가 펼쳐집니다</div>

<script>
const EP_COLORS = [
  0x4A7AFF,0xC090E0,0x8A6FE8,0x2ECC88,0xC090E0,0xE0A830,
  0x8A6FE8,0x4A7AFF,0x2ECC88,0xE060B0,0x30C8E8,0x30C8E8,
  0x4A7AFF,0xF06030,0xC090E0,0x4A7AFF,0xE0A830,
  0x2ECC88,0xE0A830,0xE0A830,0x30C8E8,0xE060B0,0xF06030,
  0xE060B0,0x4A7AFF,0x4A7AFF,0xC090E0
];
const EP_LABELS = [
  "AI vs 인간","유체 과학사","시간←시계→똑딱","평평한 연결감","선 넘는 슈뢰딩거",
  "인식론적 위기","버블 현재","귀여워♥","요란한 변이","욕망이라는 언어",
  "Quantum AI","Into Unknown","수식이 작품","기후변화","각자 놓인 맥락",
  "파인만 씨","직관=확증편향","유전자스러움","우연한 믿음","Assemble",
  "AI라는","어쩔수가없다","주인공이","미지의 언어","매스미디어",
  "우주에서","잘 잤으면"
];
const CONCEPTS = ["실재","몸","감각","언어","맥락","생명체","연결","충돌","경계","다양성","탐구","가능성","측정","시간","우연","리듬"];
const CCOL = {
  "실재":0x6B8CFF,"몸":0x1FC48A,"감각":0x3ED9A0,"언어":0xE07040,
  "맥락":0x8BA0FF,"생명체":0x2ECC88,"연결":0x3A90E0,"충돌":0xF07848,
  "경계":0xE0A830,"다양성":0x5DA020,"탐구":0x3A90E0,"가능성":0x7B8FFF,
  "측정":0x5AADE8,"시간":0xF07848,"우연":0xE0A830,"리듬":0x1FC48A
};

let nodeGroup;

async function startAR() {
  const container = document.getElementById('container');

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container,
    imageTargetSrc: './targets.mind',
  });

  const { renderer, scene, camera } = mindarThree;
  const anchor = mindarThree.addAnchor(0);

  nodeGroup = new THREE.Group();
  buildNodeWorld(nodeGroup);
  anchor.group.add(nodeGroup);

  anchor.onTargetFound = () => {
    document.getElementById('loading').classList.add('hide');
    document.getElementById('hint').textContent = '경험노드 세계가 활성화되었습니다';
  };

  anchor.onTargetLost = () => {
    document.getElementById('hint').textContent = '마커를 다시 비추면 위치가 갱신됩니다';
  };

  await mindarThree.start();

  renderer.setAnimationLoop(() => {
    animateNodes();
    renderer.render(scene, camera);
  });
}

function buildNodeWorld(group) {
  const N = EP_LABELS.length;
  const turns = 2.3;
  const scale = 0.003;

  for (let i = 0; i < N; i++) {
    const t = i / (N - 1);
    const a = -Math.PI / 2 + t * turns * Math.PI * 2;
    const r = (100 + 450 * t) * scale;
    const x = r * Math.cos(a);
    const z = r * Math.sin(a);
    const y = t * 1.2;

    const geo = new THREE.BoxGeometry(0.06, 0.03, 0.005);
    const mat = new THREE.MeshBasicMaterial({ color: EP_COLORS[i], transparent: true, opacity: 0.85 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.lookAt(0, y, 0);
    group.add(mesh);

    const edgeGeo = new THREE.EdgesGeometry(geo);
    const edgeMat = new THREE.LineBasicMaterial({ color: EP_COLORS[i], transparent: true, opacity: 0.5 });
    const edges = new THREE.LineSegments(edgeGeo, edgeMat);
    edges.position.copy(mesh.position);
    edges.rotation.copy(mesh.rotation);
    group.add(edges);
  }

  CONCEPTS.forEach((c, i) => {
    const a = (i / CONCEPTS.length) * Math.PI * 2;
    const r = 0.8 + (i % 3) * 0.15;
    const x = r * Math.cos(a);
    const z = r * Math.sin(a);
    const y = 0.4 + Math.sin(a * 2) * 0.3;
    const geo = new THREE.SphereGeometry(0.04 + (i % 4) * 0.008, 16, 16);
    const mat = new THREE.MeshBasicMaterial({ color: CCOL[c], transparent: true, opacity: 0.7 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.userData = { type: 'concept', label: c, basePos: { x, y, z }, phase: Math.random() * Math.PI * 2 };
    group.add(mesh);
  });

  const positions = [];
  const colors = [];
  for (let i = 0; i < 300; i++) {
    positions.push((Math.random() - 0.5) * 2.5, Math.random() * 1.5, (Math.random() - 0.5) * 2.5);
    const c = new THREE.Color(0x8899bb);
    colors.push(c.r, c.g, c.b);
  }
  const wordGeo = new THREE.BufferGeometry();
  wordGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  wordGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  const wordMat = new THREE.PointsMaterial({ size: 0.008, vertexColors: true, transparent: true, opacity: 0.4, sizeAttenuation: true });
  group.add(new THREE.Points(wordGeo, wordMat));

  const spiralPts = [];
  for (let i = 0; i <= N * 8; i++) {
    const t = i / (N * 8);
    const a2 = -Math.PI / 2 + t * turns * Math.PI * 2;
    const r2 = (100 + 450 * t) * scale;
    spiralPts.push(new THREE.Vector3(r2 * Math.cos(a2), t * 1.2, r2 * Math.sin(a2)));
  }
  const spiralGeo = new THREE.BufferGeometry().setFromPoints(spiralPts);
  group.add(new THREE.Line(spiralGeo, new THREE.LineBasicMaterial({ color: 0x3040aa, transparent: true, opacity: 0.15 })));

  group.scale.set(0.3, 0.3, 0.3);
}

let time = 0;
function animateNodes() {
  time += 0.01;
  if (!nodeGroup) return;
  nodeGroup.traverse(obj => {
    if (obj.userData && obj.userData.type === 'concept') {
      const bp = obj.userData.basePos;
      const ph = obj.userData.phase;
      obj.position.x = bp.x + Math.sin(time + ph) * 0.02;
      obj.position.y = bp.y + Math.cos(time * 0.7 + ph) * 0.015;
      obj.position.z = bp.z + Math.sin(time * 0.5 + ph) * 0.02;
    }
  });
}

startAR();
</script>
</body>
</html>
