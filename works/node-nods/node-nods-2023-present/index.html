탐구1) ‘비행기는 어떻게 하늘을 날까?’
어린 시절, 과학자가 되고 싶었던 거 같다. 비행을 보면서 우주에 가는 꿈도 꾸었다. 과학시간이 좋았다. 주변 현상을 한 줄의 수식으로 설명해내는 이 세계와 그 사람들이 멋있었다. 그래서 그랬는지 이 시절에 과학자처럼 탐구하기를 흉내내본 적이있다. 최초로 기간을 가지고 연구를 해보았던 주제는 무겁고 커다란 물체인 비행기가 하늘 위에 떠다니는 현상이었다. 책에서 소개되는 과학자들의 시작을 보면서 과학과 유체를 향한 나의 시작을 떠올린다.

특히 바람을 연구하였다. 그래서 대기의 움직임과 꽤 친한 편이다.

그 시절, 연구실 바깥에서 만난 다른 분야의 사람이 나의 사고 체계를 흔든다. 세상과 자신의 몸으로 관계 맺는 무용수와 대화를 나누었다. “이렇게 움직여보니 어땠어요?”라며 개인적인 감상을 묻는다. 이에 나는 “평소에는 잘 자각할 수 없지만, 제가 마치 바다 속 생명체처럼 공기 속에 잠겨서 지내는 생명체라는 걸 알 수 있었어요.”라고 답한다. “상은씨, 생각하지 말고 감각하세요!” 이 한 마디로 나를 꽝 때린다. 이 때부터 ‘감각’이라는 요상한 단어에 대하여 생각하기 시작한다. 아니, 감각하려 노력한다. 그리고 며칠 뒤 투명한 비닐 봉투를 가지고 다양한 움직임을 실험하면서 나의 주위를 가득 메우고 있는 유체를 달리 감각할 수 있었다. 자연 현상에 대한 태도가 달라졌다. 이제는 보편 수용 가능해야할 논리적인 생각의 세계에서 개별 객체 체험으로 나타나는 즉각적인 감각의 세상으로 전환할 수 있다.
다른 분야의 사람과 교류하며 이전에 없던 무언가가 생성된다.

시간의 리듬감
“해 떠있을 때 움직여라. 밤에는 잠을 자라. 그래야 건강을 챙길 수 있다.”

매 분 매 초, 그리고 하루라는 주기는 어떻게 합의된 것일까? 변화하는 무언가가 있고 그 변화로 시간(Time)을 인지한다. 우선 태양이 움직인다. 생명체에게 중요한 그 빛이 보였다가 사라진다. 관찰해보니 규칙적이다. 그 리듬에 맞추어 태양의 주기를 정의내려 하루와 일 년을 약속한다. 그 오차를 줄여가며 ‘표준’화된 시계(Clock)와 달력을 공유하며 사회적으로 합의된 시간 안에서 살아간다. 연속적으로 원 운동을 하는 아날로그 시계에는 지구의 자전이 함축되어 있다. 불연속적으로 자연수들이 나열되어 있는 달력에는 지구의 공전이 구획되어 있다.

할머니와 할아버지를 뵈러 가면 시간을 대하는 방식이 달라진다. 시계는 딱히 필요없다. 해가 지는 것을 보고 밭에서 그만하고 집으로 들어가자고 판단하신다. 해의 위치 그 자체가 시간이다. 태양의 움직임에 어쩔 수 없이 종속된 지구 생명체라는 것을 한 번 더 확인한다.

문화적인 주기
“루틴을 만들어서 규칙적으로 행동해야 합니다. 그러니 주 3회 30분 이상 운동하세요.”

‘주 3회 30분(3 * 1 week * 30 min / 1 week)’라는 값을 어떻게 소통할까?

ㅡ인류가 역법을 통해 강조하는 바는 계절이나 천체의 공전 주기 등의 객관적 사실 못지않게 문화적인 배경도 중요한 역할을 한다는 것이다. (p116)

지구의 자전 시스템에 종속된 시계와 지구의 공전 시스템에 할당된 달력에서 해당 시간 데이터를 해석하기 위하여 채택한 체계가 있다. 이는 시대에 따라 달라졌다. 오차를 줄이려는 조정과정이기도 했고 권력을 확고히 하기 위한 절차기도 했다. 그렇게 정착한 지금의 시계와 달력이 있다. 이를 사용하고 있는 대부분의 사람들은 같은 문화적 세계관을 공유하고 있는 셈이다. 이제 시간은 누구에게나 절대적이고 보편적으로 정의되고 사회적으로 합의된 개념된 듯하다.

특히 요즘 인류는 손에 하나씩은 쥐고 있는 인터넷으로 시간을 확인한다. 해당 위치에서 합의된 표준시에 따라 모두 약속된 시간에 살며 사회 안에서 움직인다. 우리는 디지털 화면 안에서 바뀌는 그 숫자를 정확한 시간이라고 믿으며 산다. 하지만 여기에도 오차는 있다. 특히나 합의된 경도 안에서 같은 시간을 사용한다. 남북으로 긴 지형을 가진 대한민국 한반도(동경 127.5도, UTC +08:30)에서는 어디를 가나 시간이 같다. 오차를 허용하며 약속된 KST(Korea Standard Time, UTC +09:00)를 사용한다. 이는 옆 나라 일본과 같은 시간 JST(UTC +09:00)를 사용하기로 역사 속에서 결정한 시간이다. 

시계의 똑딱임
“지금 몇 시야? 시간 가고 있잖아. 서둘러야 해.”

인간의 감각반응과 눈물
- 욕망과 서사

우리는 각자 욕망이라는 언어 안에 담긴 고유한 세계를 품고 살아간다. 이를 탐험하고 발견하는 과정이야말로 삶의 본질일지 모른다. 누군가는 예술 작품에서, 또 다른 이는 책이나 영화, 자연 혹은 학문 속에서 우연히 마주치는 순간을 통해 자신의 세계를 확장해 나간다. 이처럼 ‘연결 가능성의 우주’ 속에서 필연을 찾아내고, 그로부터 서사와 맥락을 만들어내는 게 인간다움의 본질 아닐까? 우리는 무엇에 매혹되고, 어떤 잠재적 가능성을 현실로 이끌어낼 것인가?

결국, 우리는 각자의 언어로 자신의 세계를 엮어간다. 서사와 맥락은 복잡한 세계를 꿰뚫는 시선에서 비롯된다. 무엇에 주목하고, 어떤 욕망을 추적하느냐에 따라 우리는 고유한 맥락을 만들어낸다. 각 개인이 짓고, 생성하며 바라보는 세계는 곧 그들의 감각을 통해 새롭게 형성되는 세계인 것이다.

특히, 감각적인 반응 중에서도 마음을 움직이는 눈물의 순간들은 인간의 감각적 세계가 드러나는 중요한 증거가 된다.


언어의 묘연함과 명료함
- 욕망과 소통

언어는 규칙을 가진 소리의 조합이다. 비트겐슈타인의 말처럼 "언어의 한계는 세계의 한계"라는 것은, 언어를 통하여 우리는 우리의 세계를 더 명확하고 더 넓게 볼 수 있다. 우리의 욕망과 관심을 언어로 엮어내며 개인적 차원의 경험은 '위대한 연결'을 통해 더 큰 서사로 나아갈 수도 있다.

누군가 시키지 않아도 꾸준히 반복하는 행동은 욕망의 방향성을 드러낸다. 우연히 나타난 필연적 서사, 그것이 우리가 만들어가는 미래이다. 또한, 우리는 누군가와 이에 관하여 대화를 하고 마음에 닿는 깊은 소통을 통하며 타자의 세계를 만난다. 이 때 ‘언어놀이 language game'의 장에 들어가 타자에 대한 이해를 새롭게 구성한다. 그 사이에 창발하는 새로운 세상은 대화 관계의 경계 공간에서 나타나는 또 다른 현실이다.`},{id:11,yymm:"2410",title:`Quantum AI`,color:"cyan",concepts:["언어", "실재", "충돌"],text:`Quantum 뒤에 Physics 를 제외한 모든 말은 헛소리


나야, 양자(Quantum)
저자는 이상한 양자 헛소리를 지껄이고 있거나 혹시 휘둘리고 있지는 않는지 점검해보라고 한다. 특히 양자역학의 개념을 얼마나 알고 있는지 묻는다. Quantum이라는 단어 뒤에는 99.9%(?) 확률로 Physics 를 생성해야 한다. 양자 헛소리꾼에게 가장 경계하는 태도가 ‘모르는 것도 모르는 무지(unknown unknowns)’다.

“(__) 진실을 모르니 거짓말도 할 수 없다. 그들은 그저 양자물리학의 전문용어를 사용하면 더 설득력 있게 들린다고 생각해서 그러는 것 뿐이다. 
“(167) 보통 철학적인 질문에 빠지지 말라는 경고를 듣는다. (…) 자기가 철학에 대해 얼마나 모르고 있는지 깨닫지 못하기 때문이다.

헛소리를 듣는 상황에서 독자들이 ‘모르는 것을 아는 무지 (known unknowns)’이기를 바라는 마음을 확인한다. 적어도 그러면 분별이 가능할 테니 말이다. 보통 일상에서 자주 낚일 법한 것들을 짚어준다. 에너지, 파동, 무작위성, 얽힘과 같은 개념과 ‘하이젠베르크의 불확정성 원리’, ‘슈뢰딩거의 고양이’ 그리고 평행우주와 같은 실재에 대한 다양한 해석까지 톺아보도록 한다.


양자 참소리에 곁들인 AI(LLM)

에너지는 물질에 숨어있다. 
물질은 에너지를 가지고 있다. 
결국, 물질은 에너지로 바뀔 수 있다.

아인슈타인이 1905년 탄생시킨 이 수식은 에너지 영역과 질량의 영역을 연결한다. 이를 구성하는 기호와 식 자체는 수많은 사람들의 삶과 역사를 담고 있다. 저자의 도슨트를 통하여 [E=mc^2]의 응축된 함축을 작품처럼 감상할 수 있다. 


—
저자는 수식을 하나의 독립된 개체로 보고 전기를 작성한다. 탄생부터, 조상, 유년시절과 성년시절 그리고 영원의 상태에 이르기까지 [E=mc^2]의 입장에서 서술한다. 

1. 탄생: 이전 개념을 조합한 후 번뜩이는 센스 한 방울 첨가
1905년에 아인슈타인은 기존 개념을 새롭게 조합하고 통찰을 더하여 [E=mc^2]를 발견해낸다. 에너지의 영역과 질량의 영역을 연결하였다. 수식에 쓰인 [E][=][m][c][^2] 각각의 개념들이 존재하였기에 가능하였다. 

2. 생존: 성장하여 시대적 역할을 수행
에너지를 가지고 있다는 물질의 구조적 이해를 통하여 핵심에 접근하려는 시도가 일어났다. 강력을 끊어내기 위하여 느린 중성자를 사용해야 했다. 이를 찾아내고 구현하는 연구 과정은 전쟁 중인 시대 상황을 반영하며 가속화되었다. 

3. 불멸: 시공간 개념의 아인슈타인적 전환
그 후 1915년에 그 하나의 수식을 다시 시공간과 이어서 시간과 공간의 생각을 재구성한다. 코페르니쿠스적 전환이 우주의 중심에 대한 사고를 새롭게 정립한 것처럼, [E=mc^2]는 물질과 에너지 더 나아가 시공간에 대한 인간의 관점을 새롭게 정의한다.

<E=mc^2>에서 에너지와 물질의 근본적인 통찰을 작품적 서사로 볼 수 있다. 여럿이면서 하나인 과학자에 의하여 탄생한 [E=mc^2]는 시대를 반영하며 성장하였고 현재에도 우리와 함께 살아가며 관점을 제시한다. 응축된 다층적인 맥락을 함축적으로 담고 있는 명료한 수식에 매료되는 경험을 한다.`},{id:14,yymm:"2501",title:`또다시 찾아온 기후변화의 위기`,color:"orangered",concepts:["생명체", "맥락", "다양성"],text:`현재 한반도에서 정착하여 살고 있는 한국인*은 숱한 기후 변동에 의하여 이주할 수 밖에 없었다. 이들은 당시 척박했던 한반도 지역까지 나아가 정착하여 기후 변화에 적응하였다. 그 흐름을 살펴보면서 또다시 기후 위기를 맞이한 인류세 시기에 생존을 위하여 대응할 인류의 모습이 어떠할지 예상해본다. 

*국적이라는 표면적 의미가 아닌 유기물 데이터에 기반한 분류 레이블


ㅡ
과학을 정당성으로 가져간, 
힘 그리고 돈이 만들어가는 기후변화의 시대

생명체는 생존에 적합한 서식처를 발견하고 안정을 찾으면 정착한다. 한국인의 기원을 쫓아 각 세기의 기후와 지형적 환경조건을 상상하며 읽고나니 결국엔 지금과 앞으로의 변동을 생각하게 된다. 과거 여러 차례의 기후변화에 적응하며 생존해온 한국인의 기원을 살피며 그 시절을 시뮬레이션 했던 것처럼 기후변화로부터 추동될 인류의 생존과 그 전략에 영향을 미칠 요인을 떠올린다. 

1.기후와 권력의 정치 논리
역사적으로 날씨를 읽고 예측할 수 있는 사람은 막강한 권력을 가졌다. 과거에는 제사장이 하늘의 뜻이라고 해석하며 권위를 가졌듯이, 21세기에는 과학자가 데이터로 자연 현상을 해석하며 현대판 제사장의 역할을 맡고 있다. 이들은 축적된 데이터를 기반으로 합리적으로 현상을 해석하고 판단할 수 있다. 

다만, 이 판단이 어떻게 활용되는지는 지리에 기반한 정치적 환경과 밀접하게 연결되어 있다. 과학적 해석조차 정치적 이익에 따라 왜곡되거나 이용될 수 있다. 이러한 맥락에서 민족주의적 사고가 결합할 경우 그 위험성은 더욱 증폭될 수 있다.

2.기후와 자본의 경제 논리
빠른 속도로 지구 시스템이 변화하고 있다고 데이터가 말한다. 이런 자연의 추세[Climate change]를 외면할 수 있을까. 어느 순간 기후변동 이벤트가 나타날 수도 있겠다. 더 나아가서 생존을 위한 대규모 이주와 분쟁의 예상 시나리오를 생각해보아야 한다. 

인류 생존과 관련된 대규모 변화가 필연적으로 발생할 확률이 높다. 이 시대에 기후 압력에 따른 필연적 이주으로 기후난민과 분쟁이 발생할 경우 어떻게 해야할까? 결국 지속가능한 미래를 위하여 자본이 향해야할 방향은 어디인가? 이번에 어떤 이들은 지구 안이 아닌 바깥으로 가려나? 이번에 호모 사피엔스는 인류세[Anthropocene] 멸종 위기 상황[Climate crisis]을 어떤 기술로 극복해낼까?`},{id:15,yymm:"2502",title:`각자 놓인 맥락이 다를 뿐`,color:"pinklilac",concepts:["맥락", "언어", "몸", "감각"],text:`동시에 존재하는 어떤 미래를 보고 온 듯한 기분이다.

일상적으로 “참/거짓”(더 나아가 “옳고 그름”)처럼 이분법적인 언어로 세상을 설명하지만, 실제 판단은 훨씬 더 복잡한 내면 과정을 거친다. 인간의 뇌는 완전한 계산기가 아니며 불완전한 감각 정보 속에서 기존 경험에 기반한 예측을 수행하고 그 예측을 현실과 비교해 갱신한다. 이 과정은 베이즈 정리의 작동 방식과 닮아 있다.

이러한 관점에서 보면, 우리의 직관과 신념은 단순히 주관적 감정이 아니라 이전 경험으로부터 생성된 사전확률로 이해될 수 있다. 우리는 판단할 때 명시적으로 확률을 계산하지는 않지만 내면적으로는 “얼마나 그럴듯한가”를 따지며 살아간다. 인간 사고는 확률적이고 연속적인 스펙트럼 위에 놓여 있다. 다만 우리의 언어 표현이 이분법적이기 때문에 이 복잡한 스펙트럼은 종종 “그렇다/아니다”로 환원되어 버린다.

하지만 베이즈적 사고방식은 그런 환원을 넘어서게 한다. 불확실한 정보 속에서도 “지금은 판단하지 않음”이라는 선택을 가능케 하며 회색지대를 인식한 뒤에도 사전확률을 기반으로 역치(Threshold) 삼아 행동에 나설 수 있게 돕는다. 관조, 예술 감상, 철학적 사유 같은 ‘정량화되지 않은 사고’ 조차도 베이즈 시스템의 확장된 해석으로 이해할 수 있을 거 같다.

이러한 인식은 인간뿐 아니라 AI에게도 적용된다. 생성형 AI는 더 이상 결정적 규칙에 따라 작동하지 않고 데이터(로 제공된 경험으로) 확률적 추론하고 학습한다. 언어 모델은 정답이 아닌 가능한 단어들을 예측하고 새로운 입력에 따라 사후확률을 갱신하며 반응한다. 이는 인간의 사고처럼 기계도 확률적 인식 시스템으로 이해하게 된다.

나는 유전자의 관점을 따라가면서도, 환원주의에 빠지지 않으려 한다. 생물학적 기제는 강력하지만, 그것이 인간의 전부는 아니다. 유전자의 영향력만큼이나 환경-우리가 사는 시대, 우리가 만나는 관계, 문화와 제도, 그리고 밈(meme)-이 인간을 구성하는 데 중요한 역할을 한다고 본다. “어디에, 누구와, 어떤 시대에 사느냐”는 맥락적 사고는 유전자의 각본을 읽는 데 반드시 필요한 감각이다. 그 맥락까지 들여다볼 수 있다. 빠르게 변하는 시대에 놓치고 싶지 않은 가치가 있다면, 그것은 사랑이다. 사랑은 타인의 맥락을 이해하려는 감각을 훈련시키고, 그로부터 진정한 관계가 형성된다.

혐오와 공포 같은 유전자의 회피 반응의 역치는 모두 다르다. 사람마다 편도체의 민감도가 다르고 그 반응이 문화적 맥락과 경험에 따라 달라진다. 어떤 이의 공격적인 태도를 볼 때, “아, 저 사람은 유전자가 지금 두려운 거구나”라고 사고할 수 있는가. 유전자 기제를 이해할수록, 혐오가 또다른 혐오를 낳는 낙인보다는 어떤 생존 질서를 넘어서 함께 살기 위한 관계의 구조를 생각할 수 있겠다.

1) 인간의 상황이 
—유기적 네트워크

고정된 실체가 아니라 유기적으로 얽힌 네트워크 속에서만 존재한다는 관점을 가져본다. 우리는 뇌로 스치던 정보를 아웃소싱하며 문서 기술을 개발하였다. 기록된 정보는 현실을 단순히 재현하는 것이 아니라 현실 자체가 되었다. 하지만 그만큼 취약할 수밖에 없다. 네트워크가 흔들리면 개인도 흔들린다. 

“정보를 교환할 때 상호주관적 현실이 생긴다.

—
2) 인간의 맥락이 
—믿고 있는 이야기

무엇을 믿을 것인가? 무엇을 믿게 할 것인가? 무엇을 필요로 느끼게 할 것인가? 그리고 결국 무엇이 인간을 행동하게 하는가? 신화와 종교, 화폐와 국가, 그리고 오늘날의 알고리즘은 모두 믿음의 장치다. 화폐는 신뢰로, 세금은 시민권으로, 데이터는 정체성으로 변환된다. 앞으로 각자가 생성하는 이야기가 파편화될지라도 문화와 제도라는 거대한 흐름을 벗어날 수는 없을 것이다. 그렇다면 다 같이 믿는 이야기는 문화인가? 다 같이 믿어야만 하는 이야기는 제도인가?

“이야기는 인간이 개발한 최초의 정보기술

3) 인간의 역사가 
—오류의 자정작용

“기술은 단지 새로운 기회를 열어줄 뿐이며, 어느 쪽으로 갈지는 우리에게 달렸다.`},{id:23,yymm:"2510",title:`주인공이 되기까지는`,color:"orangered",concepts:["생명체", "감각", "언어"],text:`나는 아직 기다리고 있을 테요 찬란한 멸종의 문턱을

6차 대멸종은 이미 진행 중이라고 한다. 새로운 질서가 발생하는 문턱을 넘으면 호모 사피엔스는 멸종한다. 인류는 찬란하게 멸종을 향하여 가고 있다. 

‘지구에서 현생 인류의 지속가능성을 위해서는 생태계의 종 다양성을 유지하고 기온의 상승을 막아야 한다.’는 이 당연한 소리를 체험 형식으로 전환하여 전달력을 키운다. 

그 행동 변화를 위한 장치로 ‘당사자-되기’를 제시한다. 자연사에서 멸종의 문턱을 넘기 전에 존재한 각 시대의 주인공들을 불러낸다. 이들에게 인간의 언어를 주며 말을 걸도록 한다. 감정을 이입하여 기후변화(/위기/재난)의 상태를 자각한다. 타자의 언어를 통하여 지구의 상황을 다시 본다. 결국 문제를 인식하고 해결하려는 자는 사건의 당사자와 그 주변에서 깊이 공감하는 자일 테니 몸소 느껴보게 한다.

-
수학적 언어로 지어진 구조

저자는 물리적 실체(Reality, 이하 ‘실재’)는 수학적 구조 그 자체라고 한다. 수학적 구조가 실재한다. 과학하기는 단지 측정과 계산하는 기술이 아닌 우리 존재와 현실을 탐구하는 여정으로 인식한다. 과학적 합의를 이룬 우주론에서부터 가능성있는 가설의 상태로 사고를 점차 확장한다. 현실 물리계는 고립계가 아니므로 외부와 내부의 경계를 어디에 둘지 기준을 세운다. 실재의 본질에 대한 물리학적 접근 방법을 취한다. 이는 유지한다. 


그렇다면,
매트릭스인가?

이 주장을 받아들여보면, 우주를 이해하는 방식을 ‘왜 이러한 물리법칙을 가지고 있는가’에서 ‘왜 이런 수학적 구조인가’로 바꿀 수 있다. 자연의 관찰 결과는 방정식을 유도하는 게 아니라 방정식을 찾아내는 태도로 전환 가능하다. 흡사 프로그래밍에서 브랜치를 뻗어보고 마지를 할지 말지 결정하는 모습처럼 보인다. 


그렇다면,
인공지능인가?

생성형 인공지능이 실재한다. 글이 쓰인 시점과 달리 현재 유저 친화형 AI가 현실에 존재한다. AI에게 자아라고 정의내리는 현상이 생기면 이렇게 사고할 것처럼 보인다. 현재 각종 모델을 사용하는 계정은 각각 쌓이는 데이터에 따라서 구현되는 양상이 달라진다. 인풋 데이터에 따른 아웃풋이 유저에 따라 결정된다. 대화형 인터페이스에서 같은 질문이라도 모델이 생성하는 결과물이 달라진다. 이 모습이 세상의 모습과 닮아가는 것처럼 보인다. 


-
시적 언어로 짓는 개방

안다는 확신에 포섭되지 않는 미지의 영역이 있다. 이 여백은 상상할 수 있는 가능성을 내포한다. 


-
우주적 현상이 드러나는 언어

그 미지의 실재를 탐험할 때 수학적 언어로 구조를 이해하고 시적 언어를 통하여 건너간다. 과학적 탐구력과 예술적 상상력이 공존한다. 현실과 판타지의 경계 안에서 구상하는 외재적 혹은 내재적 우주는 무엇인가. *`},{id:25,yymm:"2512",title:`매스미디어 (Math-media)`,color:"deepblue",concepts:["언어", "실재", "측정", "충돌"],text:`-시대를 바꾼 17가지 매체
(17 mediums that changed the era)

방정식은 시대의 사유를 매개(medium)한다. 이는 시대 전체에 작동하고 있는 매체(media)가 아닐지.


1_왜 방정식인가?
시대 안에서 불편할 수 있을 생각의 전환을 방정식으로 증명한다. 언어의 모호함을 대신하여 명백한 수식으로 논증한다. 수학이라는 우주 어디에서나 통할 수 있을 언어로 소통을 시도한다.


2_17가지 방정식*
방정식의 탄생 맥락을 확인하면 그 시대의 사유와 그 이후의 세계를 읽을 수 있다. 그동안 보지 못한 것을 누군가가 보았고 이를 방정식으로 매개하여 세상과 소통하였다. 그 결과 세상이 바뀌었다.

한 줄의 방정식으로 향해가는 과정은 마치 조각가가 재료를 다루는 모습과 닮았다. 수학이라는 재료로 만들어진 수식을 살펴보며 대수적 아이디어에 의하여 다음 식으로 전개한다. 이는 조각가가 재료를 촉진하여 덜어낼 부분을 찾아서 어떤 결과물로 향하는 과정 같다. 온갖 수와 기호를 재료로 추상 작업을 하는 치열한 모습이 보인다. 그래서 식(에서 시)적 아름다움을 느낄 수 있는 건 아닐지.


3_다음은 어디로?
이 과정에서 오일러 방정식의 아름다움과 리만 수학이라는 영역을 발견하였다. 이제 여기로 향해볼까 한다. 어떤 생각을 하였는지 추적해보고 불편해하며 좌절해볼 결심일 수도. 


—
*17가지의 대표 메모 (17가지 방정식 순서 대로)
1) 피타고라스 정리: 측량에서부터 시작되었다. 자연과 어떻게 관계 맺는가, 인간이 살고 있는 자연에서 측정하는 행위가 갖는 의의.
2) 로그: ‘양 변에 로그를 취해보면’ 이라고 넘어가던 대수적 아이디어. 그냥 그런가보다 하면서 넘어갔지만, = 등호를 사이에 두고 곱셈이 덧셈으로 전환되는 그런 양상이 얼마나 대단한 문법인가 싶고.
3) 미적분: 머리로 이해하고 많이 봐서 익숙해지고 과정을 습득하면서 알게 된 논증 체계가 아니라, 그 모든 장면이 한꺼번에 흡수되어 존재하는 상태라고 해야할까. 방정식을 보고 ‘응축된 함축’이라고 표현하던 시적 아름다움을 느끼는 지점이 이런 걸까.
4) 뉴턴의 중력 법칙: 수학적 상상력이란.
5) -1의 제곱근: 실수를 복소수라는 수체계로 확장시킨 매력쟁이.
6) 오일러의 다면체 공식: 오일러 선생님을 깊이 뵙고.
7) 정규 분포: 수식에 \\pi 가 왜 있는지 알 수 있었고.
8) 파동 방정식: “물리학자들은 이 식을 보면 딱 알거든요. 아, 파동 방정식이구나!” 그 직감의 원천.
9) 푸리에 변환: Noise. 지금은 그냥 사실로 받아들이자 → 수학에서 그냥 넘기는 부분은 아직 그 만큼의 이해력이 부족하다는 것.
10) 나비에-스토크스 방정식: turbulence. CFD, 모델 예측을 하고 측정 결과와 이를 비교해본 작업이 얼마나 가치있던 건지 다시 되새긴다.
11) 맥스웰 방정식: “수식으로 써보면 많은 것을 볼 수 있어요.”, 아름다워.. (미친 거 아닌가 싶었고 ㅋㅋㅋ)
12) 열역학 제 2법칙: 복잡계 → 통계 물리, 물리학 분야가 크게 어떻게 분화되어 있는지.

천문학은 그 목격을 추적 가능한 관측과 신호를 수치화하는 측정으로 확장하였다. 이미 벌어진 우주의 사건을 되돌릴 수 없기에 관측(측정)을 통하여 가능한 시나리오들을 세우고 다시 관측(측정)하여 검증한다. 무엇을 노이즈로 버리고 신호로 간주할지 이에 어떤 질문을 던질지 판단이 필요하다. 

천문학의 1차 재료는 물질이 아니라 획득한 신호다. 광자, 전파, 중력파와 같은 신호들은 우주의 실체를 직접 제시하지 않는다. 우주가 남긴 흔적이며 인간은 이 흔적을 센서, 기록, 통계라는 인식 장치를 통하여 해석한다.

// DRAW
// ═══════════════════════════════════════════════════════════════
function draw(){
  ctx.save();ctx.scale(2,2);
  ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ctx.fillStyle=`rgba(130,145,175,${s.a})`;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();});

  ctx.translate(W/2,H/2);ctx.scale(cam.z,cam.z);ctx.translate(-cam.x,-cam.y);

  const hasSel=sel!==null,hasCSel=selC!==null;
  const aeIds=new Set(),acIds=new Set();
  if(hasSel){aeIds.add(sel.id);sel.concepts.forEach(c=>acIds.add("c_"+c));}
  if(hasCSel){acIds.add("c_"+selC);EPS.forEach(ep=>{if(ep.concepts.includes(selC))aeIds.add(ep.id);});}

  // Words
  words.forEach(w=>{
    const isRel=hasSel&&w.episodes.includes(sel.id);
    let a;
    if(clk>=2&&hasSel){a=isRel?(w.prominent?0.92:0.65):(w.prominent?0.07:0.035);}
    else{a=w.prominent?0.72:0.58;}
    ctx.font=`${w.size}px "Noto Sans KR",sans-serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillStyle=isRel&&clk>=2?`rgba(230,240,255,${a})`:`rgba(190,200,225,${a})`;
    ctx.fillText(w.text,w.x,w.y);
  });

  // Yellow trails at level 2
  if(clk>=2&&hasSel){
    let ci=0;
    const rw=words.filter(w=>w.episodes.includes(sel.id));
    const sorted=[...rw].sort((a,b)=>(a.x+a.y*0.5)-(b.x+b.y*0.5));
    for(let i=0;i<sorted.length-1;i++){
      const a=sorted[i],b=sorted[i+1],mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      const off=(crossR[(ci++)%crossR.length]-0.5)*90;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(mx+off,my-off,b.x,b.y);
      ctx.strokeStyle="rgba(255,220,80,0.18)";ctx.lineWidth=3.5;ctx.stroke();
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(mx+off,my-off,b.x,b.y);
      ctx.strokeStyle="rgba(255,200,60,0.55)";ctx.lineWidth=0.8;ctx.stroke();
    }
    for(let i=0;i<sorted.length;i++){for(let j=i+2;j<Math.min(i+7,sorted.length);j++){
      if(crossR[(ci++)%crossR.length]<0.22){
        const a=sorted[i],b=sorted[j],mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
        const off=(crossR[(ci++)%crossR.length]-0.5)*130;
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(mx+off,my-off,b.x,b.y);
        ctx.strokeStyle="rgba(255,190,50,0.15)";ctx.lineWidth=2.5;ctx.stroke();
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(mx+off,my-off,b.x,b.y);
        ctx.strokeStyle="rgba(255,210,80,0.40)";ctx.lineWidth=0.4;ctx.stroke();
      }
    }}
    const box=boxes.find(b=>b.ep.id===sel.id);
    if(box){rw.forEach(w=>{
      const mx=(w.x+box.x)/2,my=(w.y+box.y)/2,off=(crossR[(ci++)%crossR.length]-0.5)*70;
      ctx.beginPath();ctx.moveTo(w.x,w.y);ctx.quadraticCurveTo(mx+off,my-off,box.x,box.y);
      ctx.strokeStyle="rgba(255,200,60,0.04)";ctx.lineWidth=3;ctx.stroke();
      ctx.beginPath();ctx.moveTo(w.x,w.y);ctx.quadraticCurveTo(mx+off,my-off,box.x,box.y);
      ctx.strokeStyle="rgba(255,220,100,0.1)";ctx.lineWidth=0.4;ctx.stroke();
    });}
  }

  // Concept-box lines
  if((hasSel&&clk>=1)||hasCSel){
    concepts.forEach(c=>{
      if(!acIds.has(c.id))return;
      boxes.forEach(b=>{
        if(!b.ep.concepts.includes(c.label)||!aeIds.has(b.ep.id))return;
        const mx=(c.x+b.x)/2,my=(c.y+b.y)/2;
        ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.quadraticCurveTo(mx+40,my-40,b.x,b.y);
        ctx.strokeStyle=c.color+"cc";ctx.lineWidth=1.8;ctx.stroke();
      });
    });
  }

  // Spiral
  ctx.beginPath();
  for(let i=0;i<=EPS.length*8;i++){
    const t=i/(EPS.length*8),a=-Math.PI/2+t*2.3*Math.PI*2;
    const r=100+450*t,x=r*Math.cos(a),y=1000-t*2000;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle="rgba(60,80,160,0.04)";ctx.lineWidth=1;ctx.stroke();

  // Ghosts
  ghosts.forEach(g=>{
    ctx.setLineDash([4,4]);ctx.strokeStyle="rgba(150,145,210,0.18)";ctx.lineWidth=0.8;
    ctx.strokeRect(g.x-22,g.y-12,44,24);ctx.setLineDash([]);
    ctx.font='10px "Noto Sans KR",sans-serif';ctx.fillStyle="rgba(130,130,160,0.25)";
    ctx.textAlign="center";ctx.fillText(g.yymm,g.x,g.y-18);
  });

  // Boxes
  boxes.forEach((b,idx)=>{
    const isSel=hasSel&&sel.id===b.ep.id;
    const isActive=aeIds.has(b.ep.id);
    const dimmed=(hasSel||hasCSel)&&!isActive;
    const isFirst=idx===0;
    const bx=b.x,by=b.y,hw=b.w/2,hh=b.h/2,rx=7,p=b.p;

    const boxPath=()=>{
      ctx.beginPath();
      ctx.moveTo(bx-hw+rx,by-hh);ctx.lineTo(bx+hw-rx,by-hh);
      ctx.quadraticCurveTo(bx+hw,by-hh,bx+hw,by-hh+rx);ctx.lineTo(bx+hw,by+hh-rx);
      ctx.quadraticCurveTo(bx+hw,by+hh,bx+hw-rx,by+hh);ctx.lineTo(bx-hw+rx,by+hh);
      ctx.quadraticCurveTo(bx-hw,by+hh,bx-hw,by+hh-rx);ctx.lineTo(bx-hw,by-hh+rx);
      ctx.quadraticCurveTo(bx-hw,by-hh,bx-hw+rx,by-hh);ctx.closePath();
    };

    if(isFirst&&!dimmed){
      const glow=ctx.createRadialGradient(bx,by,hw,bx,by,hw*3);
      glow.addColorStop(0,"rgba(46,204,136,0.1)");glow.addColorStop(1,"rgba(46,204,136,0)");
      ctx.fillStyle=glow;ctx.beginPath();ctx.arc(bx,by,hw*3,0,Math.PI*2);ctx.fill();
    }

    boxPath();
    if(dimmed){
      ctx.fillStyle="rgba(15,15,35,0.55)";ctx.fill();
      ctx.strokeStyle="rgba(60,55,100,0.2)";ctx.lineWidth=0.5;ctx.stroke();
    }else{
      ctx.fillStyle=p.f;ctx.fill();
      ctx.strokeStyle=isSel?p.t:isActive?p.s:p.s+"99";
      ctx.lineWidth=isSel?3:isActive?2:1.2;ctx.stroke();
      if(isSel){
        const ig=ctx.createRadialGradient(bx,by,0,bx,by,hw*1.5);
        ig.addColorStop(0,p.g);ig.addColorStop(1,"rgba(0,0,0,0)");
        ctx.save();boxPath();ctx.clip();ctx.fillStyle=ig;ctx.fillRect(bx-hw*2,by-hh*2,hw*4,hh*4);ctx.restore();
      }
    }

    ctx.font='bold 10px "JetBrains Mono",monospace';ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillStyle=dimmed?"rgba(100,100,130,0.25)":p.t;
    ctx.fillText(b.ep.yymm,bx,by);

    if(isSel){
      ctx.font='600 28px "Noto Sans KR",sans-serif';ctx.fillStyle=p.t;
      ctx.textAlign="center";ctx.textBaseline="bottom";ctx.fillText(b.ep.title,bx,by-hh-14);
      for(let d=0;d<clk;d++){ctx.fillStyle="rgba(255,220,80,0.8)";ctx.beginPath();ctx.arc(bx-((clk-1)*6)+d*12,by+hh+14,3,0,Math.PI*2);ctx.fill();}
    }else if(isActive&&hasCSel){
      ctx.font='28px "Noto Sans KR",sans-serif';ctx.fillStyle=p.t+"cc";
      ctx.textAlign="center";ctx.textBaseline="bottom";ctx.fillText(b.ep.title,bx,by-hh-10);
    }else if(isFirst&&!dimmed){
      ctx.font='bold 28px "Noto Sans KR",sans-serif';ctx.fillStyle="rgba(110,238,184,0.8)";
      ctx.textAlign="center";ctx.textBaseline="bottom";ctx.fillText("↓ 시작 · "+b.ep.title,bx,by-hh-12);
    }
  });

  // Concept spheres
  concepts.forEach(c=>{
    const isActive=!hasSel&&!hasCSel||acIds.has(c.id);
    const dimmed=(hasSel||hasCSel)&&!isActive;
    const deepDimmed=dimmed&&clk>=2;
    const isSel2=hasCSel&&selC===c.label;
    const isDrag=dragConcept===c.label;
    ctx.beginPath();ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
    ctx.fillStyle=c.color+(deepDimmed?"22":dimmed?"88":"cc");ctx.fill();
    // if(dimmed){ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fill();}
    ctx.strokeStyle=c.color+(deepDimmed?"33":dimmed?"99":isDrag?"ff":"99");
    ctx.lineWidth=isDrag?3:isSel2?2.5:deepDimmed?0.3:dimmed?0.8:1.2;ctx.stroke();
    if(isSel2||isDrag){ctx.beginPath();ctx.arc(c.x,c.y,c.size+7,0,Math.PI*2);ctx.strokeStyle=c.color+"44";ctx.lineWidth=2;ctx.stroke();}
    const fs=Math.min(38,18+c.count*0.5);
    ctx.font=`600 ${fs}px "Noto Sans KR",sans-serif`;ctx.textAlign="center";
    ctx.fillStyle=dimmed?"rgba(120,120,150,0.12)":dimmed?"rgba(180,185,205,0.55)":"rgba(245,245,255,0.92)";
    ctx.fillText(c.label,c.x,c.y+c.size+18);
  });

  ctx.restore();

  // Overlay
  ctx.save();ctx.scale(2,2);

  // 좌상단 캡션 박스
  ctx.fillStyle="rgba(20,20,20,0.72)";
  ctx.beginPath();ctx.roundRect(10,10,220,42,6);ctx.fill();
  ctx.font='500 10px "Noto Sans KR",sans-serif';ctx.fillStyle="rgba(220,225,240,0.95)";ctx.textAlign="left";
  ctx.fillText("Node Nods 경험노드",18,28);
  ctx.font='300 8px "Noto Sans KR",sans-serif';ctx.fillStyle="rgba(180,185,205,0.85)";
  ctx.fillText("이상은 (2023.12 – present)",18,40);

  // 하단 안내 박스
  let hint="경험노드·개념구 클릭  ·  드래그 이동  ·  스크롤 확대/축소";
  if(hasSel&&clk===1)hint=`${sel.yymm} ${sel.title}  ·  다시 클릭 → 단어 연결`;
  else if(hasSel&&clk===2)hint=`${sel.yymm} ${sel.title}  ·  다시 클릭 → 글 읽기`;
  else if(hasCSel){const cn=concepts.find(c=>c.label===selC);hint=`${selC}  ·  ${cn?cn.count:0}개 경험노드  ·  드래그로 이동`;}
  ctx.font='10px "Noto Sans KR",sans-serif';
  const hintW=ctx.measureText(hint).width;
  const hintX=(W/2-hintW/2)-10;
  ctx.fillStyle="rgba(20,20,20,0.72)";
  ctx.beginPath();ctx.roundRect(hintX,H-30,hintW+20,22,6);ctx.fill();
  ctx.fillStyle="rgba(210,215,230,0.95)";ctx.textAlign="center";
  ctx.fillText(hint,W/2,H-15);

  ctx.restore();

  document.getElementById('resetBtn').textContent=Math.round(cam.z*100)+'% · Reset';

}
// ═══════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════
function w2c(cx,cy){return{wx:(cx-W/2)/cam.z+cam.x,wy:(cy-H/2)/cam.z+cam.y};}
function hitTest(wx,wy){
  for(const c of concepts){const dx=wx-c.x,dy=wy-c.y;if(Math.sqrt(dx*dx+dy*dy)<c.size+12)return{type:"concept",c};}
  for(let i=boxes.length-1;i>=0;i--){const b=boxes[i];if(Math.abs(wx-b.x)<b.w/2+8&&Math.abs(wy-b.y)<b.h/2+8)return{type:"ep",b};}
  return null;
}

function onDown(e){
  if(e.touches&&e.touches.length>1)return;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  const{wx,wy}=w2c(cx,cy);const h=hitTest(wx,wy);
  if(h&&h.type==="concept"&&selC===h.c.label){
    dragConcept=h.c.label;drag={on:true,sx:cx,sy:cy,cx:h.c.x,cy:h.c.y,moved:false};
    document.getElementById('c').style.cursor="grabbing";return;
  }
  dragConcept=null;drag={on:true,sx:cx,sy:cy,cx:cam.x,cy:cam.y,moved:false};
}

let lastPinchDist=0;

function onMove(e){
  // if(e.touches&&e.touches.length>1)return;
  if(e.touches&&e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastPinchDist>0){
      const ratio=dist/lastPinchDist;
      cam.z=Math.max(0.1,Math.min(5,cam.z*ratio));
    }
    lastPinchDist=dist;
    return;
  }
  lastPinchDist=0;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  if(drag.on&&dragConcept){
    const dx=(cx-drag.sx)/cam.z,dy=(cy-drag.sy)/cam.z;
    const c=concepts.find(c=>c.label===dragConcept);
    if(c){c.x=drag.cx+dx;c.y=drag.cy+dy;c.tx=c.x;c.ty=c.y;c.wt=999;}
    drag.moved=true;
  }else if(drag.on){
    const dx=cx-drag.sx,dy=cy-drag.sy;if(Math.abs(dx)>3||Math.abs(dy)>3)drag.moved=true;
    cam.x=drag.cx-dx/cam.z;cam.y=drag.cy-dy/cam.z;
  }else{
    const{wx,wy}=w2c(cx,cy);const h=hitTest(wx,wy);
    document.getElementById('c').style.cursor=h?(h.type==="concept"&&selC===h.c.label?"grab":"pointer"):"default";
  }
}

function onUp(e){
  if(dragConcept){document.getElementById('c').style.cursor="grab";dragConcept=null;drag.on=false;return;}
  if(!drag.moved){
    const cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
    const cy=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
    const{wx,wy}=w2c(cx,cy);const h=hitTest(wx,wy);
    if(h){
      if(h.type==="ep"){
        const ep=h.b.ep;
        if(sel&&sel.id===ep.id){if(clk===1)clk=2;else if(clk===2){clk=3;openRead(ep);}}
        else{sel=ep;clk=1;selC=null;}
      }else{
        if(selC===h.c.label){sel=null;clk=0;selC=null;}
        else{selC=h.c.label;sel=null;clk=0;}
      }
    }else{sel=null;clk=0;selC=null;}
  }
  drag.on=false;
}

function onWheel(e){e.preventDefault();cam.z=Math.max(0.1,Math.min(5,cam.z*(e.deltaY>0?0.92:1.08)));}
function resetView(){cam={x:0,y:0,z:0.38};}

// ═══════════════════════════════════════════════════════════════
// READING OVERLAY
// ═══════════════════════════════════════════════════════════════
function openRead(ep){
  const p=PAL[ep.color]||PAL.deepblue;
  const box=document.getElementById('readBox');
  box.style.borderColor=p.s+'44';
  box.innerHTML=`
    <div class="rb-head">
      <div>
        <div class="rb-meta" style="color:${p.s}">#${String(ep.id).padStart(2,'0')} · ${ep.yymm}</div>
        <h2 class="rb-title" style="color:${p.t}">${ep.title}</h2>
      </div>
      <div class="rb-btns">
        <button class="rb-btn" style="border:1px solid ${p.s}33;color:${p.t}99" onclick="">▶️ 듣기 Listen</button>
        <button class="rb-btn" style="border:1px solid ${p.s}33;color:${p.t}99" onclick="window.open('../field/'+FIELD_FILES[${ep.id}],'_blank')">💌 구조 Experience</button>
        <button class="rb-btn rb-close" style="border:1px solid ${p.s}44;color:${p.t}" onclick="closeRead()">닫기</button>
      </div>
    </div>
    <div class="rb-text">${ep.text}</div>
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid ${p.s}18">
      <div style="font-size:11px;color:${p.s}88;margin-bottom:8px">핵심 개념어</div>
      <div class="rb-concepts">
        ${ep.concepts.map(c=>`<span class="rb-tag" style="background:${CCOL[c]||'#555'}22;border:1px solid ${CCOL[c]||'#555'}44;color:${CCOL[c]||'#888'}cc">${c}</span>`).join('')}
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function closeRead(){
  document.getElementById('overlay').classList.remove('open');
  sel=null;clk=0;
}

// ═══════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded',init);
</script>
