<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper 25 — 매스미디어 (Math-media)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f8f8f4;--wall:#f0efe8;--ink:#141410;--ink-mid:#787068;
  --ink-faint:#847753;--acc:#303030;--acc-dim:rgba(48,48,48,.06);
  --rule:#e4e0d4;--open-bg:#141410;--open-ink:#f0efe8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#c4c0b4;font-family:'EB Garamond',serif;min-height:100vh;padding:36px 16px 80px}

.catalog{max-width:860px;margin:0 auto;background:var(--paper);box-shadow:0 2px 40px rgba(0,0,0,.16)}

/* 상단 네비게이션 */
.catalog-topnav {padding:16px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--rule);background:var(--paper);}
.topnav-link {font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--ink-faint);text-decoration:none;text-transform:uppercase;}

/* 커버 섹션 */
.catalog-cover{padding:40px 48px 32px;border-bottom:3px solid var(--ink);background:var(--wall)}
.cc-meta{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px;display:flex;gap:20px;flex-wrap:wrap}
.catalog-title{font-size:clamp(24px,4vw,44px);font-weight:400;line-height:1.1;letter-spacing:-.015em;margin-bottom:4px}
.catalog-en{font-style:italic;font-size:clamp(18px,3vw,30px);color:var(--ink-mid)}

/* 그리드 시스템 (UI 깨짐 방지) */
.entries-section{padding:0 48px}
.entries-hint{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-faint);padding:16px 0;font-style:italic}
.entries-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule)}

/* 펼쳐지는 카드 UI */
.entry-card {background:var(--paper);cursor:pointer;transition:background .2s;display:flex;flex-direction:column;overflow:hidden;}
.entry-card:hover {background:var(--acc-dim)}
.entry-card.open {background:var(--open-bg);grid-row: span 1;} 

.entry-front {padding:18px 16px;min-height:160px;display:flex;flex-direction:column;}
.entry-num {font-family:'DM Mono',monospace;font-size:9px;color:var(--ink-faint);margin-bottom:8px}
.entry-card.open .entry-num {color:rgba(240,239,232,0.3)}

.entry-formula {font-size:14px;color:var(--ink);margin:15px 0;min-height:45px;display:flex;align-items:center}
.entry-card.open .entry-formula {color:var(--open-ink)}

.entry-name {font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-mid);margin-top:auto}
.entry-card.open .entry-name {color:rgba(240,239,232,0.4)}

/* 작가 노트 (그리드 밖으로 벗어나지 않게 처리) */
.entry-note {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 0 16px;
  background: var(--open-bg);
}
.entry-card.open .entry-note {
  max-height: 500px;
  opacity: 1;
  padding: 0 16px 24px;
  border-top: 1px solid rgba(240,239,232,0.1);
}
.en-label {font-family:'DM Mono',monospace;font-size:8px;color:rgba(240,239,232,0.35);margin:12px 0 8px;display:block;text-transform:uppercase;}
.en-text {font-size:13px;color:rgba(240,239,232,0.7);line-height:1.6;font-style:italic}

/* ESSAY & NAV (기존 유지) */
.essay-section{padding:28px 48px;border-top:1px solid var(--rule)}
.es-head{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px}
.es-text{font-size:16px;line-height:1.9;color:var(--ink-mid)}.es-text+.es-text{margin-top:.9em}
.next-expedition{margin:28px 48px;padding:24px;border:1px solid var(--ink);background:var(--wall)}
.ne-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.ne-label::after{content:'';flex:1;height:1px;background:var(--rule)}
.ne-title{font-style:italic;font-size:clamp(18px,3vw,26px);color:var(--ink);margin-bottom:10px}
.ne-targets{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.ne-target{font-size:15px;color:var(--ink);padding:6px 16px;border:1px solid var(--ink)}
.ne-note{font-size:14px;color:var(--ink-mid);line-height:1.65}
.catalog-nav{padding:16px 48px;border-top:1px solid var(--rule);display:flex;justify-content:space-between}
.pn-back,.pn-next{font-family:'DM Mono',monospace;font-size:10px;text-decoration:none;color:var(--ink-mid)}

@media(max-width:600px){.entries-grid{grid-template-columns:repeat(2,1fr)}.entries-section,.catalog-cover{padding-left:20px;padding-right:20px}}
</style>
</head>
<body>
<div class="catalog">
  <nav class="catalog-topnav">
    <a class="topnav-link" href="#">← NODE NODS</a>
    <span class="topnav-link">No. 25 / 2512</span>
  </nav>

  <div class="catalog-cover">
    <div class="cc-meta">
      <span>No. 25 / 2512</span>
      <span>이언 스튜어트, 『세상을 바꾼 17가지 방정식』</span>
      <span>전시 카탈로그</span>
    </div>
    <h1 class="catalog-title">매스미디어</h1>
    <div class="catalog-en">(Math-media)</div>
  </div>

  <div class="entries-section">
    <div class="entries-hint">클릭하면 작가 노트가 열립니다 — 17점</div>
    <div class="entries-grid" id="entriesGrid"></div>
  </div>
</div>


<div class="essay-section">
  <div class="es-head">식(에서 시)적 아름다움</div>
  <p class="es-text">한 줄의 방정식으로 향해가는 과정은 마치 조각가가 재료를 다루는 모습과 닮았다.</p>
</div>

<div class="next-expedition">
  <div class="ne-label">다음 탐구 예고</div>
  <div class="ne-title">이 과정에서 발견한 새로운 목적지</div>
  <div class="ne-targets">
    <div class="ne-target">오일러 방정식</div>
    <div class="ne-target">리만 수학</div>
  </div>
</div>

<nav class="catalog-nav">
  <a class="pn-back" href="/works/node-nods/node-nods-2023-present/index.html">← Node Nods</a>
  <a class="pn-next" href="/works/node-nods/field/26_Scoop Out from the Cosmos.html">26 — 우주에서 건져내기 →</a>
</nav>
</div>


<script>
// 수식 기호 깨짐 방지를 위해 역슬래시(\)를 두 번(\\) 사용
const equations = [
  {n:1,f:'a^2+b^2 = c^2',name:'피타고라스 정리',note:'측량에서부터 시작되었다. 자연과 어떻게 관계 맺는가, 인간이 살고 있는 자연에서 측정하는 행위가 갖는 의의.'},
  {n:2,f:'\\log(ab) = \\log a + \\log b',name:'로그',note:'‘양 변에 로그를 취해보면’ 이라고 넘어가던 대수적 아이디어. 그냥 그런가보다 하면서 넘어갔지만, = 등호를 사이에 두고 곱셈이 덧셈으로 전환되는 그런 양상이 얼마나 대단한 문법인가 싶고.'},
  {n:3,f:'\\frac{df}{dt} = \\lim_{h \\to 0} \\frac{f(t+h)-f(t)}{h}',name:'미적분',note:'머리로 이해하고 많이 봐서 익숙해지고 과정을 습득하면서 알게 된 논증 체계가 아니라, 그 모든 장면이 한꺼번에 흡수되어 존재하는 상태라고 해야할까. 방정식을 보고 ‘응축된 함축’이라고 표현하던 시적 아름다움을 느끼는 지점이 이런 걸까.'},
  {n:4,f:'F = G \\frac{m_1 m_2}{r^2}',name:'뉴턴의 중력 법칙',note:'수학적 상상력이란.'},
  {n:5,f:'i^2 = -1',name:'복소수: -1의 제곱근',note:'실수를 복소수라는 수체계로 확장시킨 매력쟁이.'},
  {n:6,f:'V - E + F = 2',name:'오일러의 다면체 공식',note:'오일러 선생님을 깊이 뵙고.'},
  {n:7,f:'\\Phi(x) = \\frac{1}{\\sqrt{2\\pi\\sigma^2}} e^{-\\frac{(x-\\mu)^2}{2\\sigma^2}}',name:'정규 분포',note:'수식에 \\pi 가 왜 있는지 알 수 있었고.'},
  {n:8,f:'\\frac{\\partial^2 u}{\\partial t^2} = c^2 \\nabla^2 u',name:'파동 방정식',note:'“물리학자들은 이 식을 보면 딱 알거든요. 아, 파동 방정식이구나!” 그 직감의 원천.'},
  {n:9,f:'\\hat{f}(\\xi) = \\int f(x) e^{-2\\pi ix\\xi} dx',name:'푸리에 변환',note:'Noise. 지금은 그냥 사실로 받아들이자 → 수학에서 그냥 넘기는 부분은 아직 그 만큼의 이해력이 부족하다는 것.'},
  {n:10,f:'\\rho(\\frac{\\partial u}{\\partial t} + u \\cdot \\nabla u) = -\\nabla p + \\mu \\nabla^2 u + f',name:'나비에-스토크스 방정식',note:'turbulence. CFD, 모델 예측을 하고 측정 결과와 이를 비교해본 작업이 얼마나 가치있던 건지 다시 되새긴다.'},
  {n:11,f:'\\begin{aligned} \\nabla \\cdot \\mathbf{E}&=\\frac{\\rho}{\\epsilon_0} \\\\ \\nabla \\cdot \\mathbf{B}&=0 \\\\ \\nabla \\times \\mathbf{E}&=-\\frac{\\partial \\mathbf{B}}{\\partial t} \\\\ \\nabla \\times \\mathbf{B}&=\\mu_0(\\mathbf{J}+\\epsilon_0 \\frac{\\partial \\mathbf{E}}{\\partial t}) \\end{aligned}',name:'맥스웰 방정식',note:'“수식으로 써보면 많은 것을 볼 수 있어요.”, 아름다워.. (미친 거 아닌가 싶었고 ㅋㅋㅋ)'},
  {n:12,f:'dS \\ge 0 \\mid S = k \\log W',name:'열역학 제 2법칙: 볼츠만 엔트로피',note:'복잡계 → 통계 물리, 물리학 분야가 크게 어떻게 분화되어 있는지.'},
  {n:13,f:'E = mc^2 \\mid R_{\\mu\\nu}-\\frac{1}{2}g_{\\mu\\nu}R = 8\\pi GT_{\\mu\\nu}',name:'상대성 이론: 아인슈타인 장방정식',note:'수식을 뜯어본지 1년 만에 다시 수식으로 만나고, 더 많은 수식들을 마주하고. 그리고 리만 텐서.'},
  {n:14,f:'i\\hbar \\frac{\\partial\\psi}{\\partial t} = \\hat{H}\\psi',name:'슈뢰딩거 방정식',note:'관측과 동시에 붕괴하는 파동함수라는 사고의 전회.'},
  {n:15,f:'H = -\\sum p(x) \\log p(x)',name:'섀넌 정보 이론',note:'AI - Human, 정보라는 신호의 이동.'},
  {n:16,f:'x_{t+1} = kx_t(1-x_t)',name:'카오스 이론',note:'현실 물리계는 비선형 복잡계.'},
  {n:17,f:'\\frac{\\partial V}{\\partial t} + \\frac{1}{2}\\sigma^2 S^2 \\frac{\\partial^2 V}{\\partial S^2} + rS \\frac{\\partial V}{\\partial S} - rV = 0',name:'블랙-숄스 방정식',note:'사회라는 분야의 경제에서 사용하는 수학 모델이 유효한지 고민.'},
];

const grid = document.getElementById('entriesGrid');
let openCard = null;

equations.forEach(eq => {
  const card = document.createElement('div');
  card.className = 'entry-card';
  card.innerHTML = `
    <div class="entry-front">
      <span class="entry-num">No. ${String(eq.n).padStart(2,'0')}</span>
      <div class="entry-formula" id="formula-${eq.n}"></div>
      <div class="entry-name">${eq.name}</div>
    </div>
    <div class="entry-note">
      <span class="en-label">작가 노트</span>
      <div class="en-text">${eq.note}</div>
    </div>
  `;

  grid.appendChild(card);
  
  // // 수식 렌더링 호출 (지연 없이 즉시 실행)
  // const formulaEl = document.getElementById(`formula-${eq.n}`);
  // try {
  //   katex.render(eq.f, formulaEl, { throwOnError: false });
  // } catch (e) {
  //   formulaEl.textContent = eq.f;
  // }

    // 수식 렌더링 실행 (KaTeX 전용 함수 호출)
    const formulaEl = card.querySelector(`#formula-${eq.n}`);
  window.addEventListener('load', () => {
    try {
      katex.render(eq.f, formulaEl, { throwOnError: false });
    } catch (e) {
      formulaEl.textContent = eq.f;
    }
  });

  card.addEventListener('click', () => {
    if (openCard && openCard !== card) openCard.classList.remove('open');
    card.classList.toggle('open');
    openCard = card.classList.contains('open') ? card : null;
  });
});
</script>
</body>
