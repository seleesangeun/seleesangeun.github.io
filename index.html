<!DOCTYPE html>
<html lang="ko" data-theme="light" data-lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current — Sangeun Lee</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- NAV -->
    <div class="nav-wrapper">
        <div class="nav-inner">
            <a class="logo" href="">SANGEUN<br>LEE</a>
            <div class="nav-links">
                <a href=""              data-nav="current"  data-key="nav_current">Current</a>
                <a href="works/"        data-nav="works"    data-key="nav_works">Works</a>
                <a href="projects/"     data-nav="projects" data-key="nav_projects">Projects</a>
                <a href="research/"     data-nav="research" data-key="nav_research">Research</a>
                <a href="archive/"      data-nav="archive"  data-key="nav_archive">Archive</a>
                <a href="about/"        data-nav="about"    data-key="nav_about">About</a>
            </div>
            <div class="nav-controls">
                <button class="ctrl-btn" id="langBtn">EN</button>
                <button class="ctrl-btn" id="themeBtn">●</button>
            </div>
            <button class="menu-toggle" id="menuToggle">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
    <div class="mobile-menu" id="mobileMenu">
        <a href=""              onclick="closeMenu()" data-key="nav_current">Current</a>
        <a href="works/"        onclick="closeMenu()" data-key="nav_works">Works</a>
        <a href="projects/"     onclick="closeMenu()" data-key="nav_projects">Projects</a>
        <a href="research/"     onclick="closeMenu()" data-key="nav_research">Research</a>
        <a href="archive/"      onclick="closeMenu()" data-key="nav_archive">Archive</a>
        <a href="about/"        onclick="closeMenu()" data-key="nav_about">About</a>
    </div>

    <main>
        <div class="fade-in">
            <div class="current-wrap">
                <h1 data-key="hero_title">Don't Forget (  )!<br>(DFG!)</h1>
                <p class="subtitle" data-key="hero_sub">2026 Group Exhibition · Space Route (Seoul)</p>
                <img src="projects/dfg/img/poster.jpeg" class="featured-img" alt="Featured">
                <div class="hero-links">
                    <a class="hero-link" href="projects/dfg/"   data-key="btn_works">View Info.</a>
                    <a class="hero-link" href="about/"   data-key="btn_about">About Artist</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <div>SANGEUN LEE</div>
            <div class="footer-copy">© 2025 Sangeun Lee. ALL RIGHTS RESERVED.</div>
            <div class="footer-social">
                <a href="#" aria-label="Instagram">@</a>
            </div>
        </div>
    </footer>

    <script src="assets/nav.js"></script>
    <script>
        Object.assign(T.en, {
            hero_title: "Don't Forget (  )!<br>(DFG!)",
            hero_sub:   "2026 Group Exhibition · Space Route (Seoul)",
            btn_works:  "View Info.",
            btn_about:  "About Artist",
        });
        Object.assign(T.ko, {
            hero_title: "Don't Forget (  )!<br>(잊지마!)",
            hero_sub:   "2026 단체전 · 공간 루트 (서울)",
            btn_works:  "전시 정보",
            btn_about:  "작가 소개",
        });
        document.addEventListener('DOMContentLoaded', () => setActive('current'));
    </script>
</body>
</html>
